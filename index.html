<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
    />
    <title>Inventory</title>
    <meta
      name="description"
      content="Quản lý kho hàng, theo dõi giao dịch mua/bán, tồn kho và phân tích lợi nhuận."
    />

    <!-- Mobile: native app feel + correct chrome/status-bar colors -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0c0e13" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Inventory" />
    <!-- Stop iOS from auto-linking IMEI/phone/order numbers -->
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />

    <!-- Fonts: preconnect + non-blocking load so first paint isn't delayed on mobile networks -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="styles/odometer-theme.minimal.css" />

  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
